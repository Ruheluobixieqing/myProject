# SQLAlchemy 数据库迁移工具 Alembic 的配置文件，采用标准 INI 格式，控制迁移脚本生成、日志记录等行为

# Alembic 配置；数据库 URL 在 env.py 中从 settings 读取，不写在此处
[alembic]
script_location = alembic             # 迁移脚本存放目录，存放 versions/
prepend_sys_path = .                  # 将项目根目录加入 Python 路径，方便导入项目代码
# sqlalchemy.url 在 env.py 中通过 config.set_main_option 设置

# 代码格式化钩子
[post_write_hooks]
# 可选：格式化为 black
# hooks = black

# 日志系统配置
[loggers]
keys = root,sqlalchemy,alembic        # 三个日志记录器

[handlers]
keys = console                        # 一个输出处理器

[formatters]
keys = generic                        # 一种格式

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

# 处理器
class = StreamHandler                     # 输出到控制台
args = (sys.stderr,)                      # 使用标准输出流
level = NOTSET                            # 不限制级别，由记录器决定
formatter = generic

# 格式
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
